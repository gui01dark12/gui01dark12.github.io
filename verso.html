<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <title>1corintios</title>
    <style>
      body {
        font: italic 20pt Arial;
        background: rgb(72, 160, 643);
        text-align: center;
      }
      
      h1 {
        text-shadow: -20px 14px 9px rgba(0, 0, 0, 0.634);
      }
      
      p.paragrafo {
        font-size: 40px;
        color: white;
        text-shadow: -20px 14px 9px rgba(0, 0, 0, 0.634);
      }
      
      p#p2 {
        color: lightgray;
        font-size: 15px;
      }
      
      button.botao {
        width: 100px;
        height: 70px;
        font-size: 20px;
        border: solid blue 1px;
        border-radius: 8px;
        color: blue;
      }
      
      :fullscreen {
        background-color: blue;
      }
    </style>
  </head>
  <body>
    <h1>1 Corintios 11:29</h1>
    <p class="paragrafo">Porque, o que come e bebe</p>
    <p class="paragrafo">indignamente, come e bebe para sua</p>
    <p class="paragrafo">própria condenação, não discernindo</p>
    <p class="paragrafo">o corpo do Senhor.</p>
    <footer>
      <p id="p2">&copy;Guilherme</p>
    </footer>
    
    <p>
      <button class="botao" id="btn1">Abrir modo tela cheia</button>
      <button class="botao" id="btn2">Sair modo tela cheia</bitton>
    </p>
      
    <script>
      var btn1 = document.getElementById("btn1");
      var btn2 = document.getElementById("btn2")
      var elem = document.documentElement;
      btn1.addEventListener("click", () => {
        if (elem.requestFullscreen) {
          elem.requestFullscreen()
        }
      })
      
      btn2.addEventListener("click", function() {
        if (document.exitFullscreen) {
          document.exitFullscreen()
        }
      })
    </script>
  </body>
</html>
