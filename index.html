<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <title>Documento</title>
    <style>
      body {
        background-color: lightblue;
        font: normal 19pt Arial;
      }
      header {
        text-align: center;
        color: white;
      }
      section {
        color: gray;
        width: 600px;
        background-color: white;
        margin: auto;
        border-radius: 10px;
        padding: 15px;
        box-shadow: 10px 10px 10px  rgba(0, 0, 0, 0.678);
      }
      div#res {
        border: solid black 1px;
      }
      input#tst {
        border: solid 1px;
        height: 30px;
        width: 100px;
        color: blue;
        border-radius: 5px;
      }
      input#avi {
        color: blue;
        border: solid blue 1px;
        border-radius: 5px;
      }
      input.inp {
        color: blue;
        border: solid blue 1px;
        border-radius: 5px;
      }
      footer {
        font-style: italic;
      }
      
      input#fullscreen {
        color: blue;
        border: solid blue 1px;
        border-radius: 5px;
        font-family: 'helvetica neue';
        helvetica, sans-serif;
        letter-spacing: 1px;
        text-transform: uppercase;
        box-shadow: -3px 3px 3px;
      }
      
      span.instagram {
        font-size: 20px;
      }
      
      :fullscreen {
        background-color: lightblue;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Repetidor de texto</h1>
    </header>
    <section>
      <div>
        <p>
          Digite um texto ou número:
          <input type="text" name="texto" id="texto" class="inp">
        </p>
        <p>
          Repetir 
          <input type="number" name="num" id="num" class="inp"> vezes
          <input type="button" value="Aviso" id="avi">
        </p>
        <input type="button" value="Repetir" id="tst">
      </div>
      <br><div id="res"></div>
      <footer>
        <p>&copy; gui01.ninja</p>
        <p>
          <a href="https://instagram.com/_guilherme_modz?igshid=ZDdkNTZiNTM=" target="_blank">
          <span class="instagram">Meu instagram</span>
        </a>
        </p>
           <input type="button" onclick="telacheia()" value="tela cheia" id="fullscreen">
      </footer>
    </section>
    <script>
      document.querySelector("input#avi").addEventListener("click", function() {
        alert("Aviso: recomendado repetir até 500 vezes")
      })
      
      document.querySelector('input#tst').addEventListener('click', () => {
        var res = document.getElementById('res')
        var txtnum = document.getElementById('texto')
        var num = document.getElementById('num')
        var ftxtnum = txtnum.value
        var fnum = Number(num.value)
        var corpo = window.document.body
        res.innerHTML = ''
        if (ftxtnum.length == 0 || num.value.length == 0) {
          alert('Digite algo antes de repetir')
        } else {
          for(let cont = 1; cont <= fnum; cont += 1) {
          res.innerHTML += `${ftxtnum} </br>`
        }
        }
        num.value = ''
        num.focus()
        
          res.style.background = 'gray'
          res.style.color = 'blue'
          res.style.borderRadius = '10px'
          res.style.padding = '10px'
          res.style.border = 'solid black 1px'
          
      })
      function telacheia() {
        var elem = document.documentElement
        if (elem.requestFullscreen) {
          elem.requestFullscreen()
        }
      }
    </script>
  </body>
</html>
