<!DOCTYPE html>
<html>
  <head lang="pt-br">
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <title>Documento</title>
    <style>
      body {
        background-color: black;
        font: normal 19pt Arial;
      }
      header {
        text-align: center;
        color: white;
      }
      section {
        color: black;
        width: 600px;
        background-color: white;
        margin: auto;
        border-radius: 10px;
        padding: 15px;
        box-shadow: 10px 10px 10px  rgba(0, 0, 0, 0.678);
      }
      div#res {
        border: solid black 1px;
      }
      input#tst {
        border: solid 1px;
        height: 30px;
        width: 100px;
      }
      input.inp {
        border: solid black 1px;
      }
      footer {
        font-style: italic;
      }
      :fullscreen {
        background-color: black;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Repetidor de texto</h1>
    </header>
    <section>
      <div>
        <p>
          Digite um texto ou número:
          <input type="text" name="texto" id="texto" class="inp">
        </p>
        <p>
          Repetir 
          <input type="number" name="num" id="num" class="inp"> vezes
          <input type="button" value="Aviso" id="avi">
        </p>
        <input type="button" value="Repetir" id="tst">
      </div>
      <div id="res"></div>
      <footer>
        <p>&copy; Guilherme</p>
           <input type="button" onclick="telacheia()" value="tela cheia">
      </footer>
    </section>
    <script>
      document.querySelector("input#avi").addEventListener("click", function() {
        alert("Aviso: recomendado repetir até 500 vezes")
      })
      
      document.querySelector('input#tst').addEventListener('click', () => {
        var res = document.getElementById('res')
        var txtnum = document.getElementById('texto')
        var num = document.getElementById('num')
        var ftxtnum = txtnum.value
        var fnum = Number(num.value)
        var corpo = window.document.body
        res.innerHTML = ''
        if (ftxtnum.length == 0 && num.length == 0) {
          alert('Digite algo antes de repetir')
        } else {
          for(let cont = 1; cont <= fnum; cont += 1) {
          res.innerHTML += `${ftxtnum} </br>`
        }
        }
        num.value = ''
        num.focus()
        
          res.style.background = 'black'
          res.style.color = 'blue'
          
      })
      function telacheia() {
        var elem = document.documentElement
        if (elem.requestFullscreen) {
          elem.requestFullscreen()
        }
      }
    </script>
  </body>
</html>
